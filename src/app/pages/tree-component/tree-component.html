<div class="tree-container">

  <div class="selector">
    <label>Chi sei?</label>
    <div class="custom-select" (clickOutside)="closeDropdown()">
      <button class="select-trigger" type="button" (click)="toggleDropdown()">
        <span class="select-value">
          @if (selectedPerson$ | async; as selectedPerson) {
          {{ getFullname(selectedPerson) }}
          } @else {
          Seleziona una persona
          }
        </span>
        <span class="select-arrow" [class.open]="dropdownOpen()">▾</span>
      </button>

      @if (dropdownOpen()) {
      <div class="select-options">
        @if (persons$ | async; as persons) {
        @for (person of persons; track person.id) {
        <button class="select-option" type="button" [class.selected]="person.id === selectedPersonId"
          (click)="selectPerson(person.id)">
          {{ getFullname(person) }}
        </button>
        }
        }
      </div>
      }
    </div>
  </div>

  <div class="tree-visualizer">
    @if (selectedPerson$ | async; as selectedPerson) {
    <h2>Ciao! {{ selectedPerson.name }} {{ selectedPerson.surname }}</h2>
    }

    <div class="svg-wrapper">
      <svg #canvas></svg>
    </div>
  </div>

</div>
