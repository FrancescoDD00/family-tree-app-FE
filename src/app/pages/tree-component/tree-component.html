<div class="tree-container">

  <div class="selector">
    <label>Chi sei?</label>
    @if (persons$ | async; as persons) {
    <select [(ngModel)]="selectedPersonId" (ngModelChange)="selectPersonById($event)">
      <option [ngValue]="null">Seleziona una persona</option>
      @for (p of persons; track p.id) {
      <option [ngValue]="p.id">
        {{ getFullname(p) }}
      </option>
      }
    </select>
    }
  </div>

  <div class="tree-visualizer">
    @if (selectedPerson$ | async; as selectedPerson) {
    <h2>Ciao! {{ selectedPerson.name }} {{ selectedPerson.surname }}</h2>
    }

    <div class="svg-wrapper">
      <svg #canvas></svg>
    </div>
  </div>

</div>
